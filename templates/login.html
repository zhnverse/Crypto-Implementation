{% extends "base.html" %}
{% block title %}Login — Sovereign Guard{% endblock %}
{% block content %}

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your encrypted account.</p>
    </div>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required
               placeholder="Your username" autocomplete="username"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-with-toggle">
          <input type="password" id="password" name="password" required
                 placeholder="Your password" autocomplete="current-password"/>
          <button type="button" class="toggle-pw" data-target="password">👁</button>
        </div>
      </div>

      <div class="crypto-info-box">
        <div class="crypto-info-icon">🔒</div>
        <div>
          After credentials are verified, you'll be asked to enter your
          <strong>TOTP 2FA code</strong> to complete login.
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
    </form>

    <p class="auth-footer">New here? <a href="{{ url_for('register') }}">Create account</a></p>
  </div>
</div>

{% endblock %}
